server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php index.html;

    charset utf-8;

    # Forward real host and scheme so Laravel generates correct URLs (include port e.g. localhost:8080)
    set $forwarded_host $http_host;
    set $forwarded_proto $scheme;
    if ($http_x_forwarded_host != "") {
        set $forwarded_host $http_x_forwarded_host;
    }
    if ($http_x_forwarded_proto != "") {
        set $forwarded_proto $http_x_forwarded_proto;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php-fpm:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTP_HOST $forwarded_host;
        fastcgi_param HTTP_X_FORWARDED_FOR $remote_addr;
        fastcgi_param HTTP_X_FORWARDED_PROTO $forwarded_proto;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

