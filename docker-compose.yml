services:
  nginx:
    image: nginx:alpine
    container_name: email2s3_nginx
    depends_on:
      - php-fpm
    ports:
      - "0.0.0.0:8080:80"   # bind to all interfaces so the app is reachable from outside the host
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      app_net:
        ipv4_address: 172.25.0.10

  php-fpm:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: email2s3_php
    environment:
      - APP_ENV=${APP_ENV:-local}
    ports:
      - "0.0.0.0:6001:6001"   # Reverb WebSocket – bind all interfaces for external access
    volumes:
      - ./:/var/www/html
    networks:
      app_net:
        ipv4_address: 172.25.0.11

  postgres:
    image: postgres:16
    container_name: email2s3_postgres
    environment:
      - POSTGRES_DB=${DB_DATABASE}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      app_net:
        ipv4_address: 172.25.0.12

  minio:
    image: minio/minio:latest
    container_name: email2s3_minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      app_net:
        ipv4_address: 172.25.0.13

  rabbitmq:
    image: rabbitmq:3-management
    container_name: email2s3_rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      app_net:
        ipv4_address: 172.25.0.14

volumes:
  postgres_data:
  minio_data:

networks:
  app_net:
    external: true
    name: email2s3_net

